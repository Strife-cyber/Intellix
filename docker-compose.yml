services:
  # ──────────────────────────────────────────────
  # micro-cer — Go microservice for CER generation
  # Repo: ../micro-cer (sibling of intellix on VPS)
  # ──────────────────────────────────────────────
  micro-cer:
    build:
      context: ../micro-cer
      dockerfile: Dockerfile
    container_name: micro-cer
    restart: unless-stopped
    working_dir: /app
    volumes:
      - cer_data:/app/data
      - cer_uploads:/app/uploads
    networks:
      - intellix-local
    environment:
      - CER_SHARED_SECRET=${CER_SHARED_SECRET:-a8b2c6d4-e0f1-4a3b-8c9d-0e1f2a3b4c5d}
    # Health check — no dedicated endpoint, so we probe the TCP port
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8080/']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────
  # Intellix — Laravel + Rust app
  # ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intellix
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - public_files:/var/www/html/public
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      - ./.env:/var/www/html/.env
    networks:
      - internal
      - intellix-local
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      # Point micro-cer client at the Docker service (container name = hostname)
      - CER_BASE_URL=http://micro-cer:8080
      - CER_SHARED_SECRET=${CER_SHARED_SECRET:-a8b2c6d4-e0f1-4a3b-8c9d-0e1f2a3b4c5d}
      - REDIS_HOST=redis
    depends_on:
      micro-cer:
        condition: service_started
      redis:
        condition: service_started
      tei:
        condition: service_started

  # ──────────────────────────────────────────────
  # Nginx reverse-proxy (Traefik-facing)
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: intellix-nginx
    restart: unless-stopped
    volumes:
      - public_files:/var/www/html/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - traefik-net
      - intellix-local
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.intellix.rule=Host(`intellix.strife-cyber.org`)'
      - 'traefik.http.routers.intellix.entrypoints=https'
      - 'traefik.http.routers.intellix.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.intellix-router.service=intellix'
      - 'traefik.http.services.intellix.loadbalancer.server.port=80'
      - 'traefik.docker.network=traefik-net'
    depends_on:
      - app

  # ──────────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: intellix-redis
    restart: unless-stopped
    networks:
      - intellix-local

  # ──────────────────────────────────────────────
  # Text Embeddings Inference (built-in embeddings)
  # ──────────────────────────────────────────────
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: intellix-tei
    restart: unless-stopped
    command: ['--model-id', 'BAAI/bge-small-en-v1.5']
    environment:
      - RUST_LOG=info
    networks:
      - intellix-local
    # Health check
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:80/health']
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ──────────────────────────────────────────────
  # Queue worker (processes embeddings, flashcard generation, etc.)
  # ──────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intellix-worker
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
      - ./.env:/var/www/html/.env
    networks:
      - internal
      - intellix-local
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_IS_WORKER=true
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - CER_BASE_URL=http://micro-cer:8080
      - CER_SHARED_SECRET=${CER_SHARED_SECRET:-a8b2c6d4-e0f1-4a3b-8c9d-0e1f2a3b4c5d}
    depends_on:
      redis:
        condition: service_started
      tei:
        condition: service_started
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=300

networks:
  traefik-net:
    external: true
  internal:
    external: true
  intellix-local:
    driver: bridge

volumes:
  public_files:
  cer_data:
  cer_uploads:
