services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intellix
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - public_files:/var/www/html/public
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      - ./.env:/var/www/html/.env
    networks:
      - internal        
      - intellix-local  
    environment:
      - APP_ENV=production
      - APP_DEBUG=false

  nginx:
    image: nginx:alpine
    container_name: intellix-nginx
    restart: unless-stopped
    volumes:
      - public_files:/var/www/html/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - traefik-net    
      - intellix-local 
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.intellix.rule=Host(`intellix.strife-cyber.org`)"
      - "traefik.http.routers.intellix.entrypoints=https"
      - "traefik.http.routers.intellix.tls.certresolver=letsencrypt" 
      - "traefik.http.routers.intellix-router.service=intellix"
      - "traefik.http.services.intellix.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-net"

  redis:
    image: redis:alpine
    container_name: intellix-redis
    restart: unless-stopped
    networks:
      - intellix-local

networks:
  traefik-net:
    external: true
  internal:
    external: true
  intellix-local:
    driver: bridge

volumes:
  public_files:
